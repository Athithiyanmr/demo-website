* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

.nav-right { display:flex; align-items:center; gap:12px; font-size:11px; color:var(--muted); }

/* ── Main Layout ── */
.main { display:flex; flex:1; overflow:hidden; }

.form-label { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px; display:block; }
.form-control { width:100%; padding:8px 12px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-size:13px; font-family:inherit; outline:none; transition:var(--transition); }

.score-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:16px; margin-top:16px; }
.score-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }

.progress-bar-wrap { margin-bottom:10px; }
.progress-label { display:flex; justify-content:space-between; font-size:11px; color:var(--muted2); margin-bottom:4px; }
.progress-track { height:5px; background:var(--bg); border-radius:3px; overflow:hidden; }
.progress-fill { height:100%; border-radius:3px; transition:width 1s cubic-bezier(0.4, 0, 0.2, 1); }
.fill-green { background:var(--green); }
.fill-blue { background:var(--accent); }
.fill-yellow { background:var(--yellow); }

.conflict-list { margin-top:12px; }

.conflict-warn { background:var(--yellow-soft); color:var(--yellow); }
.conflict-err { background:var(--red-soft); color:var(--red); }
.conflict-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.dot-green { background:var(--green); }
.dot-yellow { background:var(--yellow); }

/* ── Map ── */

/* ── Tabs ── */
.stab-row { display:flex; gap:3px; margin-bottom:14px; background:var(--surface); border-radius:var(--radius); padding:3px; }
.stab { flex:1; padding:6px; text-align:center; font-size:11px; font-weight:600; border-radius:6px; cursor:pointer; background:transparent; color:var(--muted); border:none; transition:var(--transition); }

/* ── Layer Toggles ── */

.layer-toggle { display:flex; align-items:center; justify-content:space-between; padding:7px 10px; background:var(--surface); border:1px solid var(--border); border-radius:6px; margin-bottom:5px; cursor:pointer; font-size:11px; color:var(--text2); transition:var(--transition); }

.toggle-knob { position:absolute; top:2px; left:2px; width:12px; height:12px; background:#fff; border-radius:50%; transition:var(--transition); }
.toggle-switch.on .toggle-knob { left:16px; }

/* ── Legend ── */
.legend { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px; margin-top:14px; }
.legend-title { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:8px; }
.legend-item { display:flex; align-items:center; gap:8px; font-size:11px; color:var(--text2); margin-bottom:5px; }

.info-box { background:var(--accent-soft); border:1px solid rgba(56,189,248,0.15); border-radius:var(--radius); padding:12px; margin-top:12px; font-size:11px; color:var(--muted2); line-height:1.6; }
.info-box strong { color:var(--accent); }

<script>
// === ALL YOUR EXISTING JS, WITH ONLY MAP-RELATED CHANGES BELOW ===

// Helper: add district boundary to any Leaflet map
function addDistrictBoundary(targetMap){
  return L.geoJSON(districtBoundary,{
    style:{
      color:'#38bdf8',
      weight:2,
      opacity:0.6,
      fillColor:'#38bdf8',
      fillOpacity:0.03,
      dashArray:'6,3'
    }
  }).bindPopup('<b style="color:#38bdf8">Anantapuram District</b><br>Andhra Pradesh').addTo(targetMap);
}

// MAP SETUP
let map,gotoLayer,protectedLayer,gridLayer,solarLayer,parcelMarker,drawnPolygon,districtLayer;
let layerState={gotozones:false,protected:false,grid:false,solar:false};
let drawPoints=[],drawMarkers=[];
let reviewMiniMap=null;

window.onload=function(){
  map=L.map('map',{center:[14.68,77.60],zoom:9,zoomControl:false});
  L.control.zoom({position:'topright'}).addTo(map);

  // Basemaps: OSM + Satellite with switcher
  const osmBase = L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    { attribution:'© OpenStreetMap contributors', maxZoom:19 }
  );

  const satelliteBase = L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    {
      attribution: 'Tiles © Esri — Source: Esri, Maxar, Earthstar Geographics, and others',
      maxZoom:19
    }
  );

  osmBase.addTo(map);

  const baseMaps = {
    "OpenStreetMap": osmBase,
    "Satellite": satelliteBase
  };
  L.control.layers(baseMaps, null, { position:'topright', collapsed:true }).addTo(map);

  // District boundary
  districtLayer=addDistrictBoundary(map);

  // Thematic layers (NOT added by default)
  gotoLayer=L.layerGroup();
  gotoZones.forEach((c,i)=>{
    L.polygon(c,{color:'#22c55e',fillColor:'#22c55e',fillOpacity:0.18,weight:2,dashArray:'6,4'})
      .bindPopup(`<b style="color:#22c55e">Go-To Zone ${i+1}</b><br>Fast-Track Eligible`).addTo(gotoLayer);
  });

  protectedLayer=L.layerGroup();
  protectedAreas.forEach((c,i)=>{
    L.polygon(c,{color:'#ef4444',fillColor:'#ef4444',fillOpacity:0.15,weight:1.5,dashArray:'4,4'})
      .bindPopup(`<b style="color:#ef4444">Protected Area ${i+1}</b><br>No development permitted`).addTo(protectedLayer);
  });

  gridLayer=L.layerGroup();
  gridLines.forEach(pts=>{
    L.polyline(pts,{color:'#38bdf8',weight:2.5,opacity:0.7,dashArray:'8,4'})
      .bindPopup('<b style="color:#38bdf8">220kV Transmission Line</b>').addTo(gridLayer);
  });

  solarLayer=L.layerGroup();
  [[15.0,77.5,95],[14.85,77.35,91],[14.65,77.60,88],[14.45,77.25,86],[14.15,77.90,82]].forEach(([lat,lng,val])=>{
    L.circle([lat,lng],{radius:18000,color:'#eab308',fillColor:'#eab308',fillOpacity:0.12,weight:1})
      .bindPopup(`Solar GHI: ~${val+5.5} MJ/m²/day`).addTo(solarLayer);
  });

  [[15.01,77.52,'Ralla Solar Park 2400MW','#a855f7'],[14.70,77.59,'Anantapur Solar 100MW','#a855f7']].forEach(([lat,lng,name,col])=>{
    L.circleMarker([lat,lng],{radius:10,color:col,fillColor:col,fillOpacity:0.5,weight:2})
      .bindPopup(`<b style="color:${col}">${name}</b><br>Existing Project`).addTo(map);
  });

  populateOfficerTable();
};

// NAVIGATION
function switchSideTab(tab,el){
  document.querySelectorAll('.stab').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('parcelTab').classList.toggle('hidden',tab!=='parcel');
  document.getElementById('mapTab').classList.toggle('hidden',tab!=='map');
}

function switchView(v,e){
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById('developerView').classList.toggle('hidden',v!=='developer');
  document.getElementById('officerView').classList.toggle('hidden',v!=='officer');
  if(v==='developer'&&map)setTimeout(()=>map.invalidateSize(),100);
}

// UPDATED: zoom to Mandal on selection
function updateVillages(){
  const m=document.getElementById('mandalSelect').value;
  const sel=document.getElementById('villageSelect');
  sel.innerHTML='';
  (villages[m]||['Village-A','Village-B','Village-C']).forEach(v=>{
    const o=document.createElement('option');o.value=v;o.text=v;sel.appendChild(o);
  });

  const center = mandalCenters[m];
  if(center && map){
    map.setView([center.lat, center.lng], 10);
  }
}

// runAssessment, clearAssessment, toggleLayer, draw tools, officer panel, review panel, toast
// keep them exactly as in your current file, except toggleLayer uses new layerState default

function toggleLayer(name,el){
  layerState[name]=!layerState[name];
  el.querySelector('.toggle-switch').classList.toggle('on',layerState[name]);
  const layers={gotozones:gotoLayer,protected:protectedLayer,grid:gridLayer,solar:solarLayer};
  if(layerState[name])layers[name].addTo(map); else map.removeLayer(layers[name]);
}

// In openReviewPanel, change mini-map basemap to OSM:
function openReviewPanel(id){

  setTimeout(()=>{
    if(reviewMiniMap){reviewMiniMap.remove();reviewMiniMap=null;}
    const container = document.getElementById('reviewMiniMapContainer');
    if(container){
      reviewMiniMap = L.map(container,{
        center:[mc.lat,mc.lng],
        zoom:11,
        zoomControl:false,
        attributionControl:false,
        dragging:false,
        scrollWheelZoom:false
      });
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
        maxZoom:19
      }).addTo(reviewMiniMap);

      L.circle([mc.lat,mc.lng],{radius:6000,color:'#f97316',fillColor:'#f97316',fillOpacity:0.3,weight:2.5}).addTo(reviewMiniMap);
      gotoZones.forEach(c=>{
        L.polygon(c,{color:'#22c55e',fillColor:'#22c55e',fillOpacity:0.12,weight:1.5,dashArray:'6,4'}).addTo(reviewMiniMap);
      });
      protectedAreas.forEach(c=>{
        L.polygon(c,{color:'#ef4444',fillColor:'#ef4444',fillOpacity:0.1,weight:1,dashArray:'4,4'}).addTo(reviewMiniMap);
      });
      addDistrictBoundary(reviewMiniMap);
    }
  },400);
}
